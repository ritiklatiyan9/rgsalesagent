  <!-- RG text below -->
  <text x="256" y="460" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial,Helvetica,sans-serif" font-size="56" font-weight="bold" letter-spacing="6">RIVERGREEN</text>
