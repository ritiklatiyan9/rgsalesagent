  <!-- Window left -->
  <rect x="155" y="230" width="50" height="45" rx="6" fill="none" stroke="white" stroke-width="12"/>
  <!-- Window right -->
  <rect x="307" y="230" width="50" height="45" rx="6" fill="none" stroke="white" stroke-width="12"/>
  <!-- Chimney -->
